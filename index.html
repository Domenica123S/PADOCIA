<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PADOCIA — Charm Bar</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond&family=Jost&family=Poppins&family=Playfair+Display&display=swap" rel="stylesheet"/>

<style>
* { box-sizing: border-box; margin:0; padding:0; }

body {
  background:#fccce4;
  font-family:'Jost',sans-serif;
  display:flex;
  flex-direction:column;
  align-items:center;
}

header { text-align:center; padding:2rem; }

.container { max-width:780px; width:100%; padding:1rem; }

#necklace-zone {
  position:relative;
  background:#fff;
  height:400px;
  border-radius:16px;
  overflow:hidden;
}

#necklace-svg { position:absolute; width:100%; height:100%; }

#charms-container { position:absolute; inset:0; }

.charm-item { cursor:pointer; }

.placed-charm {
  position:absolute;
  width:52px;
  height:52px;
  transform:translate(-50%,-50%);
  cursor:grab;
}

.charm-palette {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(80px,1fr));
  gap:10px;
  margin-top:20px;
}
</style>
</head>

<body>

<header>
<h1>Build Your Necklace</h1>
</header>

<div class="container">

<div id="necklace-zone">
<svg id="necklace-svg" viewBox="0 0 780 280">
<image href="necklace.png" x="0" y="0" width="780" height="280"/>
</svg>

<div id="charms-container"></div>
</div>

<div class="charm-palette" id="palette"></div>

</div>

<script>

const charms = [
{ id:'star', icon:'<img src="star.png" width="40">'},
{ id:'moon', icon:'<img src="moon.png" width="40">'},
{ id:'heart', icon:'<img src="heart.png" width="40">'},
{ id:'butterfly', icon:'<img src="butterfly.png" width="40">'},
{ id:'flower', icon:'<img src="flower.png" width="40">'},
{ id:'sun', icon:'<img src="sun.png" width="40">'},
{ id:'icecream', icon:'<img src="icecream.png" width="40">'},
{ id:'bow', icon:'<img src="bow.png" width="40">'},
{ id:'eye', icon:'<img src="eye.png" width="40">'},
{ id:'diamond', icon:'<img src="diamond.png" width="40">'},
{ id:'clover', icon:'<img src="clover.png" width="40">'},
{ id:'mushroom', icon:'<img src="mushroom.png" width="40">'},
{ id:'cherry', icon:'<img src="cherry.png" width="40">'},
{ id:'amor', icon:'<img src="amor.png" width="40">'},
{ id:'tennis', icon:'<img src="tennis.png" width="40">'},
{ id:'wine', icon:'<img src="wine.png" width="40">'},
{ id:'cupid', icon:'<img src="cupid.png" width="40">'},
{ id:'ballerina', icon:'<img src="ballerina.png" width="40">'},
{ id:'music', icon:'<img src="music.png" width="40">'},
{ id:'cheetah', icon:'<img src="cheetah.png" width="40">'},
{ id:'sparkle', icon:'<img src="sparkle.png" width="40">'},
];

const palette = document.getElementById('palette');
const container = document.getElementById('charms-container');
const zone = document.getElementById('necklace-zone');

let placedCharms = [];
let dragEl=null,offX=0,offY=0;

charms.forEach(c=>{
  const el=document.createElement('div');
  el.className='charm-item';
  el.innerHTML=c.icon;
  el.onclick=()=>addCharm(c);
  palette.appendChild(el);
});

function addCharm(c){
  const zRect=zone.getBoundingClientRect();
  const x=zRect.width/2;
  const y=zRect.height/2;

  const el=document.createElement('div');
  el.className='placed-charm';
  el.innerHTML=c.icon;
  el.style.left=x+'px';
  el.style.top=y+'px';

  makeDrag(el);
  container.appendChild(el);
}

function makeDrag(el){
  el.onmousedown=e=>{
    dragEl=el;
    const rect=el.getBoundingClientRect();
    offX=e.clientX-(rect.left+rect.width/2);
    offY=e.clientY-(rect.top+rect.height/2);
  };
}

document.onmousemove=e=>{
  if(!dragEl)return;
  const zRect=zone.getBoundingClientRect();
  let x=e.clientX-zRect.left-offX;
  let y=e.clientY-zRect.top-offY;
  dragEl.style.left=x+'px';
  dragEl.style.top=y+'px';
};

document.onmouseup=()=>dragEl=null;

</script>

</body>
</html>
